<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MINT{% endblock %}</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e4e4e4;
      line-height: 1.6;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .navbar a {
      color: #e4e4e4;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
      font-size: 0.9rem;
    }

    .navbar a:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .navbar .nav-links {
      display: flex;
      gap: 0.5rem;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 2rem;
    }

    .logo {
      margin-bottom: 2rem;
    }

    .logo img {
      max-width: 300px;
      width: 100%;
      height: auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #fff;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #b4b4b4;
    }

    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group input[type="email"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.2);
    }

    .form-group input::placeholder {
      color: #666;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4a9eff;
    }

    .checkbox-group label {
      font-size: 0.875rem;
      color: #b4b4b4;
      margin: 0;
    }

    .btn {
      width: 100%;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4a9eff 0%, #006fd6 100%);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 158, 255, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e4e4e4;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: 0.75rem;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .error-message {
      background: rgba(220, 53, 69, 0.2);
      border: 1px solid rgba(220, 53, 69, 0.4);
      color: #ff6b7a;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }

    .field-error {
      color: #ff6b7a;
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: #666;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
      padding: 0 1rem;
    }

    .text-center {
      text-align: center;
    }

    .text-muted {
      color: #888;
      font-size: 0.875rem;
    }

    .link {
      color: #4a9eff;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.5rem;
        margin: 1rem;
      }

      .navbar {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('main.index') }}" style="font-weight: 600; font-size: 1.1rem;">MINT</a>
    <div class="nav-links">
      {% if current_user.is_anonymous %}
        <a href="{{ url_for('main.login') }}">Login</a>
        <a href="https://LewisResearchGroup.github.io/ms-mint-app" target="_blank">Docs</a>
      {% else %}
        <a href="{{ url_for('main.logout') }}">Logout</a>
      {% endif %}
    </div>
  </nav>

  <div class="main-container">
    <div class="logo">
      <img src="/static/MINT-logo.jpg" alt="MINT Logo">
    </div>

    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
